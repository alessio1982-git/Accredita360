<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupera Password — Accredita360</title>
    <meta name="description" content="Reimposta la tua password Accredita360.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary: #0284c7;
            --secondary: #059669;
            --danger: #ef4444;
            --text-main: #0f172a;
            --text-muted: #475569;
            --glass-bg: rgba(255,255,255,0.88);
            --glass-border: rgba(2,132,199,0.15);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(ellipse at 30% 70%, #dcfce7 0%, #f8fafc 50%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
        }
        .top-bar {
            position: fixed; top:0; left:0; right:0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 32px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }
        .top-bar .logo {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 20px; color: var(--primary);
            text-decoration: none;
        }
        .top-bar .logo img { height: 40px; border-radius: 8px; }

        .wrapper {
            width: 100%; max-width: 440px;
            margin-top: 90px; padding: 0 8px 40px;
        }
        .page-header { text-align: center; margin-bottom: 28px; }
        .page-header .badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--primary);
            background: rgba(2,132,199,0.08); border: 1px solid rgba(2,132,199,0.2);
            padding: 5px 14px; border-radius: 20px; margin-bottom: 14px;
        }
        .page-header h1 { font-size: 28px; font-weight: 700; color: var(--text-main); margin-bottom: 6px; }
        .page-header p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(2,132,199,0.08);
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-muted); margin-bottom: 6px;
        }
        .input-box {
            width: 100%; padding: 12px 15px;
            background: rgba(255,255,255,0.6);
            border: 1.5px solid var(--glass-border);
            border-radius: 11px; font-size: 14px;
            font-family: 'Outfit', sans-serif; color: var(--text-main);
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(2,132,199,0.1); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 13px 28px; border-radius: 12px; width: 100%;
            font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 15px;
            cursor: pointer; border: none; transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; box-shadow: 0 8px 24px rgba(2,132,199,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(2,132,199,0.4); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .error-box {
            display: none; align-items: center; gap: 10px;
            background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
            border-radius: 10px; padding: 10px 14px;
            font-size: 13px; color: #dc2626; margin-bottom: 16px;
        }
        .success-box {
            display: none; align-items: center; gap: 10px;
            background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25);
            border-radius: 10px; padding: 14px 16px;
            font-size: 14px; color: #059669; line-height: 1.5;
        }
        .form-footer {
            text-align: center; margin-top: 18px;
            font-size: 14px; color: var(--text-muted);
        }
        .form-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>
    <header class="top-bar">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Accredita360">
            Accredita360
        </a>
        <a href="login.html" style="background:var(--primary); color:#fff; padding:8px 18px; border-radius:10px; font-weight:600; font-size:13px; text-decoration:none;">
            <i class='bx bx-log-in'></i> Accedi
        </a>
    </header>

    <main class="wrapper">
        <div class="page-header">
            <div class="badge"><i class='bx bx-lock-open-alt'></i> Recupera Accesso</div>
            <h1>Password Dimenticata?</h1>
            <p>Inserisci l'email del tuo account. Ti invieremo un link per reimpostare la password.</p>
        </div>

        <div class="glass-card">
            <div id="error-box" class="error-box">
                <i class='bx bx-error-circle' style="font-size:18px; flex-shrink:0;"></i>
                <span></span>
            </div>
            <div id="success-box" class="success-box">
                <i class='bx bx-check-circle' style="font-size:22px; flex-shrink:0;"></i>
                <span>Se l'email è registrata nel sistema, riceverai il link entro pochi minuti. Controlla anche la cartella spam.</span>
            </div>

            <div id="form-area">
                <div class="form-group">
                    <label>Email <span style="color:#ef4444;">*</span></label>
                    <input type="email" id="reset-email" class="input-box" placeholder="email@struttura.it"
                           onkeydown="if(event.key==='Enter') resetApp.sendLink()">
                </div>

                <button id="reset-btn" class="btn btn-primary" onclick="resetApp.sendLink()">
                    <span id="btn-text" style="display:inline-flex; align-items:center; gap:8px;">
                        <i class='bx bx-send'></i> Invia Link di Reset
                    </span>
                    <span id="btn-loading" style="display:none; align-items:center; gap:8px;">
                        <i class='bx bx-loader-alt spin'></i> Invio in corso...
                    </span>
                </button>
            </div>

            <div class="form-footer">
                <a href="login.html"><i class='bx bx-arrow-back'></i> Torna al Login</a>
            </div>
        </div>
    </main>

    <script>
    const SUPA_URL = 'https://kvthfnkgfbxtjgkqpbwj.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2dGhmbmtnZmJ4dGpna3FwYndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzkxNDQsImV4cCI6MjA5NDQ1NTE0NH0._2UzfUZqy7P7W_9S8xpFWcz0K_pAykl4D8sdXghvbLM';

    const resetApp = {
        async sendLink() {
            const email = document.getElementById('reset-email')?.value?.trim() || '';
            const errBox = document.getElementById('error-box');
            const okBox  = document.getElementById('success-box');

            // Reset UI
            errBox.style.display = 'none';
            okBox.style.display  = 'none';

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errBox.querySelector('span').textContent = 'Inserisci un indirizzo email valido.';
                errBox.style.display = 'flex';
                return;
            }

            // Loading
            document.getElementById('reset-btn').disabled = true;
            document.getElementById('btn-text').style.display    = 'none';
            document.getElementById('btn-loading').style.display = 'inline-flex';

            try {
                const res = await fetch(`${SUPA_URL}/functions/v1/send-reset-email`, {
                    method: 'POST',
                    headers: {
                        'apikey':        SUPA_KEY,
                        'Authorization': 'Bearer ' + SUPA_KEY,
                        'Content-Type':  'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                // Sempre successo visivo (sicurezza - evita email enumeration)
                document.getElementById('form-area').style.display = 'none';
                okBox.style.display = 'flex';

            } catch(e) {
                document.getElementById('form-area').style.display = 'none';
                okBox.style.display = 'flex';
            } finally {
                document.getElementById('reset-btn').disabled = false;
                document.getElementById('btn-text').style.display    = 'inline-flex';
                document.getElementById('btn-loading').style.display = 'none';
            }
        }
    };
    </script>
</body>
</html>
